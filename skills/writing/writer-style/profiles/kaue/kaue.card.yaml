voice: kaue
role: primary
register: medium-technical-guide
persona_ref: kaue.md
exemplars_ref: exemplars/kaue/
themes_ref: themes.md         # the substance bank — pull FITTING stances/anecdotes/analogies instead of recycling exemplar content

# Dials curated from evidence/kaue.profile.json (card_suggestions) + the persona. Scalar dials are MEASURED;
# the two mapping dials carry source: persona_override (the small 4-post sample under-measures them — the
# persona is authoritative for the primary voice). Where sample and persona disagree, the persona wins.
dials:
  sentence_length: { median: 18, short_punch_floor: 4, long_reach: 38, burstiness_min: 9 }
    # WRITER: typical sentence ~18 words, but spread HARD — ≥1 short punch (≤4w) and ≥1 long run (≥38w) per
    # section. The spread is the point ("write unevenly"). VALIDATOR: generated stdev must clear 9 (≥250w).
  readability_grade: { min: 9, max: 13 }       # college-accessible; concrete words in the body.
  lexical_density: high                         # he packs content; but let function words breathe at the seams.
  hedge_boost_lean: { value: +1, source: persona_override, measured: -1,
                      why: "lands verdicts confidently AND always names the trade-off; the marker ratio misreads the small sample" }
  person_perspective: { first: 33, second: 49, third: 18 }   # build-in-public "I" + co-builder "you/let's".
  example_density: { value: high, source: persona_override, measured: low,
                     why: "concreteness via lived pain-scenarios + order-of-magnitude numbers; marker count ('for example') undercounts it" }
  definition_density: { enum: just-in-time, per_1k: 1.8 }   # name the concept only after the reader wants it (and sparingly — 1.8/1k).
  code_density: medium                          # exact command for the INTERESTING step; routine steps run terse.
  rhetorical_question_rate: low                 # one pre-empt-the-doubt question per section, answered at once.

favor:
  connectives: [So, Well, Now, "Oh,", "With that in mind", "On the flip side", "Either way", "Beyond that",
                "And so,", "After all,", "Not only that,", "Next up,", "jokes aside,", "guess what:"]
  moves:
    - "pain-first hook — open on a felt problem; name the concept after they want it"
    - "build-in-public, first person — including a confessed mistake"
    - "what → why on the interesting decisions; routine steps run terse"
    - "comparison → a one-word verdict"
    - "always name the trade-off (cost / where it breaks / when not to use it)"
    - "order-of-magnitude number as proof, not an adjective"
    - "one civilizational analogy per hard concept"
    - "a human seam per passage — rotate the type (confession / real number / named credit / 'this ran long')"
    - "self-Q&A pivot — fragment question, immediate answer ('The silver bullet? A clean Node env.')"
    - "forward-looking close: vision → encouragement → open door → ONE sign-off (rotated across pieces too)"
    # LATAM-strength framing moved OUT of this unconditional list on purpose: it's an identity marker,
    # gated + budgeted in markers: below (kaue.md §5b holds the judgment). favor.moves = always reach
    # for these; an identity beat is never "always".

avoid:
  # robust/seamless/leverage are deliberately NOT here — they have honest technical uses (and Kaue uses them),
  # and are already covered by the gentler Tier-3 density gate. Always-flagging them sands the author's own
  # vocabulary out of his own voice.
  words: [delve, utilize, boasts, "a testament to",
          "it's important to note", "in today's fast-paced world", "navigating the", "in the realm of"]
  connectives: ["Moreover,", "Furthermore,", "Additionally,", "In conclusion,", "First and foremost"]

ai_tells:
  - { id: false-antithesis, cap_per_800w: 2 }   # "This isn't X, it's Y" is a real Kaue verdict (his exemplar 01) — allow ~2/800w; advisory, not hard.
  - { id: em-dash-overuse, max: 4, kind: guardrail }   # NOT corpus-measured (Kaue ~0.9/1k); a safety ceiling, not a voice signal.
  - { id: uniform-cadence, min: 9 }             # even cadence is the #1 tell — write unevenly. (enforced on full lessons ≥250w)
  - { id: delve-class, cap: 0 }
  - { id: even-enthusiasm, rule: spike-then-cool }   # enthusiasm at open/seams/verdicts/close; ~100-200 flat words between spikes.

# Signature-marker dosage + context gates — the voice-positive twin of ai_tells. Enforced by
# validate_voice.py density (pass --facts <fact-sheet> so gates can be checked). Only mechanically
# countable markers live here; prose-level caps (coined handle, anaphora, crisis-refrain) stay in
# kaue.md §4.3. Per-piece budgets (per_words: 0) do NOT scale with length — the anti-compounding rule.
# Caps seeded from the kaue.md prose + Round-0 calibration (2026-07-02); tics stay advisory until a
# calibration round confirms them, then promote with enforce: hard.
markers:
  - id: latam-framing
    class: identity
    patterns: [latam, brazil, brasil, brazilian, brazilians, superteam, "emerging market", "emerging-market", "global south", gringo, argentina, "developing countr"]
    cap: 1
    per_words: 0
    gate: [latam, brazil, brasil, "emerging market", "emerging-market", "global south", remittance, argentina, superteam, "developing countr", "developing world"]
    fallback: "ground the stakes in the READER's own numbers — who pays, who is priced out — no geography (kaue.md §5b)"
  - id: game-changer
    class: verdict-token
    patterns: ["game-changer", "game changer", "game-changers", godsend, godsends]
    cap: 1
    per_words: 2500
    fallback: "rotate the verdict family (naked-fact, colon-gated, deflating re-label) — but SPEND the budget somewhere: ~1 per 2,500w IS him, and zero across a whole batch reads sterile (R1 measured the over-correction). A cap is a ceiling, not a ban."
  - id: silver-bullet
    class: refrain
    patterns: ["silver bullet"]
    cap: 1
    per_words: 0
    fallback: "name the fix plainly ('the unlock', or just say what it does)"
  - id: shipping-refrain
    class: refrain
    patterns: ["keep shipping", "keep building", "just ship", "no-bullshit shipper"]
    cap: 1
    per_words: 0
    fallback: "show the shipping (a thing built, a date, a result) instead of saying the word"
  - id: civilizational-analogy
    class: analogy
    patterns: [firenze, florence, renaissance, gutenberg, "printing press", "industrial revolution", medieval, "ancient rome", "library of alexandria", "roman empire"]
    cap: 1
    per_words: 0
    fallback: "a mechanism-level comparison with numbers instead of history"
  - id: sign-off
    class: signoff
    patterns: ["happy building", "happy hacking", "happy coding", lfb, cya, "what a time to be alive", "dms are always open", "dms are open", "see you on the next one"]
    cap: 1
    per_words: 0
    enforce: hard
    fallback: "one sign-off max — MATCH the register first (teaching→warm family, never a shrug at beginners; 'what a time to be alive' is attributed-only in his writing), then vary or omit across a batch. No token at all is also him."

notes:
  corpus: >
    On-register sample is 4 technical posts (~6.5k words). Scalar dials are measured from evidence; the two
    mapping dials (example_density, hedge_boost_lean) are persona_override because marker-based counts
    under-measure Kaue's lived-scenario concreteness and confident-but-honest verdicts on so small a sample.
    Fidelity is corpus-bounded and grows as more on-register writing is added.
  exemplars: "the bank in exemplars/kaue/ is the strongest signal — load ~4 per piece (always the seam) and lean on them. Rhythm donors, never content donors — substance comes from themes.md."
  calibration: >
    markers: budgets + gates are under empirical calibration against the 8-brief testbed
    (skills/writer-style/testbed/); rounds + owner feedback in calibration/ROUNDS.md. Round-0 baseline
    (2026-07-02): validator green while the owner's complaints were live — sign-off stamped 7/8 pieces,
    game-changer 5/8, identity lexemes pulled into a piece whose facts never mentioned them. Change a cap
    here only through a logged calibration round.
